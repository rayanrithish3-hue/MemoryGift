<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Share Your Thoughts ❤️</title>

<link rel="stylesheet" href="feedback.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

</head>

<body>

<div class="container">

<div class="glass">

<h1>Share Your Thoughts ❤️</h1>

<p>

I hope this small gift brought a smile to your face.

I'd love to know what you think.

</p>

<textarea
id="message"
placeholder="Type your thoughts here...">
</textarea>

<button id="sendBtn">

Send ❤️

</button>

</div>

</div>

<div id="success" class="success">

🎉 Message Sent Successfully ❤️
    
<div id="quoteOverlay" class="quote-overlay">

    <div class="quote-box">

        <h2>
            Some stories don't need a perfect ending.
            <br><br>
            Some memories never need a goodbye.
            <br><br>
            They simply stay in our hearts forever.
        </h2>

        <p class="signature">
            — By Rithish ❤️
        </p>

    </div>

</div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
emailjs.init({
    publicKey: "bpQMCzQnb8vyzP_eG"
});
</script>
  
  <script src="feedback.js"></script>

</body>

</html>
