<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hidden Letter</title>

<link rel="stylesheet" href="letter.css">

</head>

<body>

<div class="scene">

    <div class="envelope">

        <img src="../assets/envelope.svg" class="envelope-img" alt="Envelope">

        <div class="letter" id="letter">

            <h2>For You ❤️</h2>

            <p>

                This message was hidden inside the envelope.

                Thank you for opening it.

            </p>

        </div>

        <button
        id="openBtn">

        Open

        </button>

    </div>

</div>

<script src="letter.js"></script>

</body>
</html>
