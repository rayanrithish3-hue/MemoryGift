<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Letter</title>

<link rel="stylesheet" href="letter.css">

</head>

<body>

<div class="container">

    <div id="lottie"></div>

    <button id="openBtn">
        💌 Open Letter
    </button>

    <div id="letter" class="hidden">

        <h1>For You ❤️</h1>

        <p>

            You didn't just become a part of my story. You became one of the most beautiful chapters of my life. And that will never change ❤️

        </p>

        <button id="continueBtn">

            Continue →

        </button>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script src="letter.js"></script>

</body>

</html>
