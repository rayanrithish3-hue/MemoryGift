<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Letter</title>

    <link rel="stylesheet" href="letter.css">
</head>
<body>

<div class="scene">

    <div class="envelope" id="envelope">

        <!-- Letter -->
        <div class="letter" id="letter">

            <h2>For You ❤️</h2>

            <p>
                This message was hidden inside the envelope.<br><br>

                One small click opened not just a letter,
                but a memory that will always stay with us.
            </p>

        </div>

        <!-- Back -->
        <div class="back"></div>

        <!-- Left Fold -->
        <div class="left-fold"></div>

        <!-- Right Fold -->
        <div class="right-fold"></div>

        <!-- Top Flap -->
        <div class="flap" id="flap"></div>

    </div>

    <button id="openBtn">Open</button>

    <button id="continueBtn">
        Continue →
    </button>

</div>

<script src="letter.js"></script>

</body>
</html>
