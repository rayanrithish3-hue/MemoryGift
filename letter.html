<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letter</title>

<link rel="stylesheet" href="letter.css">

</head>

<body>

<div class="scene">

    <div class="envelope" id="envelope">

        <!-- LETTER -->

        <div class="letter" id="letter">

            <div class="paper">

                <h2>❤️ For Bharathi Priya ❤️</h2>

                <p>
                    Every memory with you means
                    more than words can explain.
                </p>

                <p>
                    Thank you for becoming one of
                    the most beautiful chapters
                    in my life.
                </p>

                <button id="continueBtn">
                    Continue ❤️
                </button>

            </div>

        </div>

        <!-- BACK -->

        <div class="back"></div>

        <!-- FRONT -->

        <div class="front"></div>

        <!-- LEFT -->

        <div class="left"></div>

        <!-- RIGHT -->

        <div class="right"></div>

        <!-- TOP FLAP -->

        <div class="flap" id="flap"></div>

    </div>

</div>

<script src="letter.js"></script>

</body>

</html>
