<svg xmlns="http://www.w3.org/2000/svg"
     width="360"
     height="240"
     viewBox="0 0 360 240">

    <defs>

        <linearGradient id="bodyGradient"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">

            <stop offset="0%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#6d28d9"/>

        </linearGradient>

        <linearGradient id="flapGradient"
                        x1="0%"
                        y1="0%"
                        x2="0%"
                        y2="100%">

            <stop offset="0%" stop-color="#c4b5fd"/>
            <stop offset="100%" stop-color="#a78bfa"/>

        </linearGradient>

        <filter id="shadow"
                x="-20%"
                y="-20%"
                width="140%"
                height="160%">

            <feDropShadow
                dx="0"
                dy="10"
                stdDeviation="10"
                flood-opacity=".25"/>

        </filter>

    </defs>

    <!-- BODY -->

    <g filter="url(#shadow)">

        <rect
            x="30"
            y="90"
            rx="10"
            ry="10"
            width="300"
            height="120"
            fill="url(#bodyGradient)"/>

    </g>

    <!-- LEFT FOLD -->

    <polygon

        points="30,90 180,165 30,210"

        fill="#7c4dff"

        opacity=".95"/>

    <!-- RIGHT FOLD -->

    <polygon

        points="330,90 180,165 330,210"

        fill="#7c4dff"

        opacity=".95"/>

    <!-- BOTTOM FOLD -->

    <polygon

        points="30,210 180,125 330,210"

        fill="#9d7dff"

        opacity=".65"/>

    <!-- TOP FLAP -->

    <polygon

        id="topFlap"

        points="30,90 180,20 330,90"

        fill="url(#flapGradient)"/>

</svg>
