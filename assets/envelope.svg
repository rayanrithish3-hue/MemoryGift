<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240">

  <!-- BACK -->
  <rect x="0" y="40" width="340" height="200" rx="4" fill="#EFC27D"/>

  <!-- LEFT FOLD -->
  <polygon
      points="0,40 170,140 0,240"
      fill="#F4CA86"/>

  <!-- RIGHT FOLD -->
  <polygon
      points="340,40 170,140 340,240"
      fill="#F4CA86"/>

  <!-- BOTTOM FOLD -->
  <polygon
      points="0,240 170,120 340,240"
      fill="#F7D394"/>

  <!-- TOP FLAP -->
  <g id="flap">

      <polygon
          points="0,40 340,40 170,140"
          fill="#F8DDB4"/>

  </g>

</svg>
